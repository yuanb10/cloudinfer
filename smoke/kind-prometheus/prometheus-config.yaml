apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 1s
      evaluation_interval: 1s

    scrape_configs:
      - job_name: cloudinfer
        metrics_path: /metrics
        static_configs:
          - targets:
              - cloudinfer:8080
