name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.13"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${GITHUB_REF_NAME:-dev}"
          for target in linux/amd64 linux/arm64 darwin/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            out="dist/cloudinfer-${version}-${os}-${arch}"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/cloudinfer
          done

      - name: Package manifests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${GITHUB_REF_NAME:-dev}"
          tar -czf "dist/cloudinfer-manifests-${version}.tgz" deploy

      - name: Package Helm chart
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          helm package helm/cloudinfer --destination dist

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cloudinfer:${{ github.ref_name }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
