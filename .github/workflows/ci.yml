name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Run tests
        run: go test ./...

      - name: Verify codelabs
        shell: bash
        run: |
          shopt -s nullglob
          scripts=(codelab/*/verify.sh)
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No codelab verification scripts found."
            exit 0
          fi

          for script in "${scripts[@]}"; do
            echo "Running ${script}"
            bash "${script}"
          done

      - name: gofmt
        run: |
          test -z "$(gofmt -l .)"
