name: PR Gates

on:
  pull_request:

jobs:
  pr-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: gofmt
        run: test -z "$(gofmt -l .)"

      - name: go vet
        run: go vet ./...

      - name: govulncheck
        run: govulncheck ./...

      - name: Unit and integration tests
        run: go test ./...

      - name: Chat completions SSE framing
        run: go test ./internal/api -run TestChatCompletionsStream -v

      - name: Responses SSE event conformance
        run: go test ./internal/api -run TestResponsesStreamConformance -v

      - name: SIGTERM drain integration
        run: go test ./cmd/cloudinfer -run TestDrainDropsReadinessAndDrainsStream -v

      - name: Metrics content-type contract
        run: go test ./internal/metrics -run TestMetricsHandlerUsesExactPrometheusTextContentType -v

      - name: Metrics parsing contract
        run: go test ./smoke -run TestMetricsEndpointExposesRequiredMetricsAndNoForbiddenLabels -v
