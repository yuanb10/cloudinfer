apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudinfer
spec:
  replicas: 1
  template:
    spec:
      terminationGracePeriodSeconds: 60
      tolerations:
        - key: workload
          operator: Equal
          value: dev
          effect: NoSchedule
      containers:
        - name: cloudinfer
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
